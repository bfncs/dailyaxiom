<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <link rel="icon" href="{{ get_url(path="favicon.svg") }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
    <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path="atom.xml", trailing_slash=false) }}">
</head>
<body>
    <header>
        <h1><a href="/">{{ config.title }}</a></h1>
        {% if config.description %}
            <p class="tagline">{{ config.description }}</p>
        {% endif %}
    </header>
    <main>
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
